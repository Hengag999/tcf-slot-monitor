name: TCF Slot Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx tsx scripts/scrape-slots.ts
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          DISCORD_WEBHOOK_TORONTO: ${{ secrets.DISCORD_WEBHOOK_TORONTO }}
          DISCORD_WEBHOOK_CALGARY: ${{ secrets.DISCORD_WEBHOOK_CALGARY }}
          DISCORD_WEBHOOK_VANCOUVER: ${{ secrets.DISCORD_WEBHOOK_VANCOUVER }}
          DISCORD_WEBHOOK_HALIFAX: ${{ secrets.DISCORD_WEBHOOK_HALIFAX }}
          DISCORD_WEBHOOK_OTTAWA: ${{ secrets.DISCORD_WEBHOOK_OTTAWA }}
          DISCORD_WEBHOOK_ASHTON: ${{ secrets.DISCORD_WEBHOOK_ASHTON }}
